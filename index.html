<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Registration Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <form class="form-box" id="form">
    <h1>Register Now</h1>

    <!-- Name -->
    <div class="input-box">
      <input type="text" id="name" required placeholder=" ">
      <label>Full Name</label>
      <small></small>
    </div>

    <!-- Email -->
    <div class="input-box">
      <input type="email" id="email" required placeholder=" ">
      <label>Email Address</label>
      <small></small>
    </div>

    <!-- Password -->
    <div class="input-box password-box">
      <input type="password" id="password" required placeholder=" ">
      <label>Password</label>
      <span class="toggle" onclick="togglePassword()">👁</span>

      <div class="strength">
        <div id="strength-bar"></div>
      </div>

      <small></small>
    </div>

    <!-- Gender -->
    <div class="input-group">
      <p>Gender</p>
      <div class="radio-group">
        <label><input type="radio" name="gender" required> Male</label>
        <label><input type="radio" name="gender"> Female</label>
        <label><input type="radio" name="gender"> Other</label>
      </div>
    </div>

    <!-- Course -->
    <div class="input-box">
      <select id="course" required>
        <option value=""></option>
        <option>Web Development</option>
        <option>AI / Machine Learning</option>
        <option>Data Science</option>
        <option>UI / UX Design</option>
      </select>
      <label>Course / Interest</label>
      <small></small>
    </div>

    <button type="submit">Register Now</button>
  </form>
</div>

<!-- Success Popup -->
<div class="popup" id="popup">
  <h2>🎉 Success!</h2>
  <p>Form submitted successfully</p>
  <button onclick="closePopup()">OK</button>
</div>

<script>
function togglePassword() {
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

const form = document.getElementById("form");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  let valid = true;

  const name = document.getElementById("name");
  const email = document.getElementById("email");
  const password = document.getElementById("password");
  const course = document.getElementById("course");

  if (name.value.trim() === "") {
    setError(name, "Enter your full name");
    valid = false;
  } else {
    setSuccess(name);
  }

  if (!email.value.includes("@")) {
    setError(email, "Enter valid email");
    valid = false;
  } else {
    setSuccess(email);
  }

  if (password.value.length < 6) {
    setError(password, "Minimum 6 characters");
    valid = false;
  } else {
    setSuccess(password);
  }

  if (course.value === "") {
    setError(course, "Select a course");
    valid = false;
  } else {
    setSuccess(course);
  }

  if (valid) {
    document.getElementById("popup").classList.add("show");
    form.reset();
    strengthBar.style.width = "0%";
  }
});

function setError(input, message) {
  const box = input.parentElement;
  const small = box.querySelector("small");
  small.innerText = message;
  small.style.color = "red";
}

function setSuccess(input) {
  const box = input.parentElement;
  const small = box.querySelector("small");
  small.innerText = "";
}

// Password Strength
const password = document.getElementById("password");
const strengthBar = document.getElementById("strength-bar");

password.addEventListener("input", () => {
  const val = password.value;
  let strength = 0;

  if (val.length > 5) strength++;
  if (val.match(/[A-Z]/)) strength++;
  if (val.match(/[0-9]/)) strength++;
  if (val.match(/[^A-Za-z0-9]/)) strength++;

  const width = ["0%","25%","50%","75%","100%"];
  const color = ["","red","orange","yellow","green"];

  strengthBar.style.width = width[strength];
  strengthBar.style.background = color[strength];
});

function closePopup() {
  document.getElementById("popup").classList.remove("show");
}
</script>

</body>
</html>
